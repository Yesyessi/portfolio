<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Poppins:wght@300&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      background-color: #FFFCF9;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 80px;
      text-align: center;
    }

    .label {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 18px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #637184;
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 72px;
      line-height: 1.15;
      color: #1A0E07;
    }

    .headline em {
      font-style: italic;
      font-weight: 400;
      color: #A65D3F;
    }

    .name {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 18px;
      color: #637184;
      letter-spacing: 0.04em;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: #A65D3F;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="label">Supanida Jennings · UX Designer</p>
    <div class="divider"></div>
    <h1 class="headline">Simple design with <em>meaningful impact.</em></h1>
  </div>
</body>
</html>
